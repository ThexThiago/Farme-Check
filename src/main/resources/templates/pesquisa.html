<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Busca de Medicamentos</title>

  <style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background:#f4f6f8;
        padding:40px;
    }

    .container{
        max-width:900px;
        margin:auto;
    }

    h1{
        text-align:center;
    }

    .search-box{
        margin:20px 0;
        text-align:center;
    }

    input{
        width:70%;
        padding:12px;
        font-size:16px;
        border-radius:8px;
        border:1px solid #ccc;
    }

    .section{
        margin-top:30px;
    }

    .card{
        background:white;
        padding:15px;
        margin:10px 0;
        border-radius:8px;
        box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .disponivel{
        border-left:6px solid #2ecc71;
    }

    .pendente{
        border-left:6px solid #e67e22;
    }

    .status{
        font-size:14px;
        color:#555;
    }
  </style>

</head>

<body>

<div class="container">

  <h1>Busca de Medicamentos</h1>

  <div class="search-box">
    <input type="text" id="search" placeholder="Buscar medicamento...">
  </div>

  <div class="section">
    <h2>Disponíveis</h2>

    <div class="card disponivel medicamento">
      <h3>Paracetamol</h3>
      <p class="status">Status: Disponível</p>
    </div>

    <div class="card disponivel medicamento">
      <h3>Ibuprofeno</h3>
      <p class="status">Status: Disponível</p>
    </div>

  </div>

  <div class="section">
    <h2>Pendentes</h2>

    <div class="card pendente medicamento">
      <h3>Amoxicilina</h3>
      <p class="status">Status: Pendente</p>
    </div>

    <div class="card pendente medicamento">
      <h3>Dipirona</h3>
      <p class="status">Status: Pendente</p>
    </div>

  </div>

</div>

<script>

  const search = document.getElementById("search");

  search.addEventListener("keyup", function(){

  let value = search.value.toLowerCase();
  let meds = document.querySelectorAll(".medicamento");

  meds.forEach(function(med){

  let nome = med.innerText.toLowerCase();

  if(nome.includes(value)){
  med.style.display = "block";
  }else{
  med.style.display = "none";
  }

  });

  });

</script>

</body>
</html>
